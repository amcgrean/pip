services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-beisser_ops}
      POSTGRES_USER: ${POSTGRES_USER:-beisser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beisser}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://beisser:beisser@db:5432/beisser_ops}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@beisser-internal.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe123!}
      SEED_ADMIN_FULL_NAME: ${SEED_ADMIN_FULL_NAME:-Internal Admin}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    env_file: .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
