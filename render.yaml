services:
  - type: web
    name: beisser-ops-backend
    env: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: API_V1_PREFIX
        value: /api/v1
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: ALGORITHM
        value: HS256
      - key: LOCAL_STORAGE_DIR
        value: /opt/render/project/src/backend/data_storage
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: beisser-ops-db
          property: connectionString
  - type: web
    name: beisser-ops-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: beisser-ops-db
    databaseName: beisser_ops
    plan: basic-256mb
    user: beisser
